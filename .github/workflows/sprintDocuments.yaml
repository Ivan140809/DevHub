name: Weekly Issues

on:
  schedule:
    - cron: '0 21 * * 1' # Lunes
    - cron: '0 21 * * 5' # Viernes
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create_issue:
    runs-on: ubuntu-latest

    steps:
      - name: Get date and day
        id: date
        run: |
          echo "DATE=$(date +'%d/%m/%Y')" >> $GITHUB_OUTPUT
          echo "DAY=$(date +'%u')" >> $GITHUB_OUTPUT

      - name: Create Issues
        uses: actions/github-script@v7
        with:
          script: |
            const date = '${{ steps.date.outputs.DATE }}';
            const day = '${{ steps.date.outputs.DAY }}';

            const common = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              assignees: [
                "brewLux",
                "KALEL2006",
                "ana2320-ux",
                "RichardCastillo-jpg",
                "Ivan140809",
                "lorenzoramire-lrc"
              ]
            };

            if (day === "1") {
              await github.rest.issues.create({
                ...common,
                title: `Sprint Planning #`,
                body: `
                # Sprint Planning – Sprint # ${date} 
                
                **Duración del Sprint: 5 dias**  
                **Fechas: ${date} a ${date}**

                ### Sprint Goal

                >  Completar Historias de Usuario: #, # y # relacionadas con .

                
                ### Sprint Backlog

                Las historias de usuario del sprint llevo a la definicion de las siguientes tasks en el sprint backlog

                ### Incremento esperado
                - Una vez finalizado el sprint el usuario podra

                `
              });
            }

            if (day === "5") {
              // Viernes → Issue 1
              await github.rest.issues.create({
                ...common,
                title: `Sprint Retrospective #`,
                body: `
                Que salio bien?

                Que no salio bien?

                Que podemos mejorar?
                
                `
              });

              // Viernes → Issue 2
              await github.rest.issues.create({
                ...common,
                title: `Sprint Review #`,
                body: `
                # Fecha: ${date}
                # Sprint Goal
                - HU#:
                - HU#:

                ## 1. Incremento entregado

                ## 2. Demostración
                - Issues cerrados: Se cerraron los siguientes issues mas relevantes al incremento entregado

                - Commits relevantes:  El incremento se ve evidenciado a traves de los siguientes commits

                ## 3. Conclusion

                ## 4. Burnup  Chart del sprint
                `
              });
            }
  
            
