services:
  mongo:
    image: mongo:latest
    container_name: devhubdb-mongo
    ports:
      - "27017:27017"
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    image: ${DOCKER_USERNAME}/devhubdb-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: src/main/Dockerfile
    container_name: devhubdb-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
    restart: unless-stopped

  frontend:
    image: ${DOCKER_USERNAME}/devhubdb-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: devhubdb-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
    depends_on:
      - backend
    networks:
      - frontend-network
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local

networks:
  backend-network:
    driver: bridge
    name: devhubdb-backend-net
  frontend-network:
    driver: bridge
    name: devhubdb-frontend-net
