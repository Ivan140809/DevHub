name: HU Metrics by Sprint

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1'

jobs:
  hu-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener métricas de HU por Sprint (Projects v2)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: puj-course
          PROJECT_NUMBER: 71

        run: |

          echo "===== MÉTRICAS HU POR SPRINT ====="

          # Obtener Project ID
          PROJECT_ID=$(gh api graphql -f query='
          query($org: String!, $number: Int!) {
            organization(login: $org) {
              projectV2(number: $number) {
                id
              }
            }
          }' -F org=$ORG -F number=$PROJECT_NUMBER \
          --jq '.data.organization.projectV2.id')

          echo "Project ID: $PROJECT_ID"

          # Traer items del proyecto
          gh api graphql -f query='
          query($project: ID!) {
            node(id: $project) {
              ... on ProjectV2 {
                items(first: 500) {
                  nodes {
                    content {
                      ... on Issue {
                        number
                        title
                        state
                        labels(first: 20) {
                          nodes {
                            name
                          }
                        }
                      }
                    }
                    fieldValues(first: 20) {
                      nodes {
                        ... on ProjectV2ItemFieldIterationValue {
                          title
                        }
                      }
                    }
                  }
                }
              }
            }
          }' -F project=$PROJECT_ID > data.json

          echo ""
          echo "===== RESULTADOS ====="

          totalHU=0
          totalSprints=0

          for sprint in \
          "Sprint 1" \
          "Sprint 2" \
          "Sprint 3" \
          "Sprint 4" \
          "Sprint 5" \
          "Sprint 6" \
          "Sprint 7" \
          "Sprint 8" \
          "Sprint 9" \
          "Sprint 10" \
          "Sprint 11" \
          "Sprint 12" \
          "Sprint 13" \
          "Sprint 14"
          do

            count=$(jq --arg sprint "$sprint" '
              [
                .data.node.items.nodes[]
                | select(.content.state == "CLOSED")
                | select([.content.labels.nodes[].name] | index("HU"))
                | select([.fieldValues.nodes[].title] | index($sprint))
              ] | length
            ' data.json)

            echo "$sprint: $count HU cerradas"

            totalHU=$((totalHU + count))
            totalSprints=$((totalSprints + 1))

          done

          promedio=$(echo "scale=2; $totalHU / $totalSprints" | bc)

          echo ""
          echo "===== RESUMEN ====="
          echo "Total HU cerradas: $totalHU"
          echo "Promedio HU por sprint: $promedio"
