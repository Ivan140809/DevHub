name: CD - Deployment

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Save current latest for rollback
        id: rollback
        run: |
          if docker pull $DOCKER_USERNAME/devhubdb-backend:latest 2>/dev/null; then
            docker tag $DOCKER_USERNAME/devhubdb-backend:latest $DOCKER_USERNAME/devhubdb-backend:rollback
            docker tag $DOCKER_USERNAME/devhubdb-frontend:latest $DOCKER_USERNAME/devhubdb-frontend:rollback
            echo "HAS_PREV=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_PREV=false" >> $GITHUB_OUTPUT
          fi

      - name: Write .env
        run: |
          printf 'MONGO_URI=%s\nJWT_SECRET=%s\nDOCKER_USERNAME=%s\nIMAGE_TAG=%s\n' \
            "$MONGO_URI" "$JWT_SECRET" "$DOCKER_USERNAME" "${{ steps.vars.outputs.IMAGE_TAG }}" > .env

      - name: Build images
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: docker compose build

      - name: Push images to Docker Hub
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: docker compose push

      - name: Deploy
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: |
          docker compose down
          docker compose up -d

      - name: Tag and push latest
        if: success()
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: |
          docker tag $DOCKER_USERNAME/devhubdb-backend:$IMAGE_TAG $DOCKER_USERNAME/devhubdb-backend:latest
          docker tag $DOCKER_USERNAME/devhubdb-frontend:$IMAGE_TAG $DOCKER_USERNAME/devhubdb-frontend:latest
          docker push $DOCKER_USERNAME/devhubdb-backend:latest
          docker push $DOCKER_USERNAME/devhubdb-frontend:latest

      - name: Rollback
        if: failure() && steps.rollback.outputs.HAS_PREV == 'true'
        run: |
          printf 'MONGO_URI=%s\nJWT_SECRET=%s\nDOCKER_USERNAME=%s\nIMAGE_TAG=%s\n' \
            "$MONGO_URI" "$JWT_SECRET" "$DOCKER_USERNAME" "rollback" > .env
          docker compose down
          IMAGE_TAG=rollback docker compose up -d
