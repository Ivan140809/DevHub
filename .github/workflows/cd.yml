name: CD - Deployment

on:
  workflow_run:
    workflows: ["CI - Integracion"]
    types: [completed]
    branches: [develop, main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set image tag
        id: vars
        run: |
          echo "IMAGE_TAG=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          PREV=$(cat .last_successful_tag 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV" >> $GITHUB_OUTPUT

      - name: Write .env
        run: |
          printf 'MONGO_URI=%s\nJWT_SECRET=%s\nDOCKER_USERNAME=%s\nIMAGE_TAG=%s\n' \
            "$MONGO_URI" "$JWT_SECRET" "$DOCKER_USERNAME" "${{ steps.vars.outputs.IMAGE_TAG }}" > .env

      - name: Build images
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: docker compose build

      - name: Deploy
        id: deploy
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: |
          docker compose down
          docker compose up -d

      - name: Health check
        run: |
          for i in $(seq 1 6); do
            if curl -sf http://localhost:8080/questions && curl -sf http://localhost:3000; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Save successful tag
        if: success()
        run: echo "${{ steps.vars.outputs.IMAGE_TAG }}" > .last_successful_tag

      - name: Rollback
        if: failure() && steps.vars.outputs.PREV_TAG != ''
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.PREV_TAG }}
        run: |
          printf 'MONGO_URI=%s\nJWT_SECRET=%s\nDOCKER_USERNAME=%s\nIMAGE_TAG=%s\n' \
            "$MONGO_URI" "$JWT_SECRET" "$DOCKER_USERNAME" "${{ steps.vars.outputs.PREV_TAG }}" > .env
          docker compose down
          docker compose up -d
