version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: mi-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT}:27017"
    env_file:
    - .evn
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

